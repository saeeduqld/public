<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#050816">
  <title>Pong Clash â€” Human vs Computer</title>
  <meta name="description" content="A fast neon ping pong showdown. Play against the computer on desktop or mobile.">
  <style>
    :root{--cyan:#5cf2ff;--pink:#ff4fd8;--yellow:#fff45c;--ink:#050816}*{box-sizing:border-box}html{background:var(--ink)}body{margin:0;min-height:100dvh;overflow-x:hidden;background:radial-gradient(circle at 50% -20%,#17316a 0%,#080b20 40%,#050713 100%);color:#fff;font-family:Impact,"Arial Black",Arial,sans-serif}button{font:inherit}.shell{width:min(1500px,100%);min-height:100dvh;margin:auto;padding:clamp(12px,2vw,28px) clamp(12px,2.5vw,38px) 24px;display:flex;flex-direction:column;gap:clamp(10px,1.6vh,20px)}header{display:flex;align-items:center;justify-content:space-between;min-height:42px}.brand{letter-spacing:.06em;font-size:clamp(19px,2.1vw,34px);font-style:italic;display:flex;align-items:center;text-shadow:0 0 20px #5cf2ff66}.brand em{font-style:inherit;color:var(--pink)}.dot{width:.72em;height:.72em;border-radius:50%;background:var(--yellow);margin-right:.35em;box-shadow:0 0 18px var(--yellow)}.actions{display:flex;gap:8px}.ghost{border:1px solid #ffffff33;color:#ffffffb8;background:#ffffff0f;padding:9px 13px;border-radius:8px;font:700 11px Arial,sans-serif;letter-spacing:.1em;cursor:pointer}.scoreboard{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;max-width:760px;width:80%;margin:auto}.side{display:flex;gap:clamp(14px,4vw,56px);align-items:center}.side.you{justify-content:flex-end;color:var(--cyan)}.side.cpu{justify-content:flex-start;color:var(--pink)}.side span{letter-spacing:.16em;font-size:clamp(13px,1.5vw,22px)}.side strong{font-size:clamp(40px,6vw,88px);line-height:.8;color:#fff;text-shadow:0 0 24px currentColor}.target{padding:0 clamp(16px,3vw,44px);text-align:center;display:flex;flex-direction:column;gap:8px;font:800 clamp(9px,1vw,13px) Arial,sans-serif;letter-spacing:.18em;color:#ffffff80;white-space:nowrap}.target i{height:3px;width:100%;background:linear-gradient(90deg,var(--cyan),#fff,var(--pink));box-shadow:0 0 10px #fff}.arena-wrap{width:100%;flex:1;min-height:300px;display:flex;align-items:center}.arena{position:relative;width:100%;height:min(58vh,720px);min-height:300px;max-height:720px;border:2px solid #5cf2ff80;border-radius:14px;overflow:hidden;box-shadow:0 0 0 1px #ff4fd833,0 0 45px #1e4eb25c,inset 0 0 40px #5cf2ff14}.arena:after{content:"";position:absolute;inset:0;pointer-events:none;background:linear-gradient(#ffffff06 50%,transparent 50%);background-size:100% 4px;mix-blend-mode:overlay}canvas{display:block;width:100%;height:100%}.overlay{position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;justify-content:center;align-items:center;background:#0305138c;backdrop-filter:blur(3px);text-align:center;padding:20px}.overlay small{color:var(--yellow);font:900 clamp(10px,1vw,14px) Arial,sans-serif;letter-spacing:.3em}.overlay h1{margin:8px 0 clamp(18px,3vh,32px);font-size:clamp(34px,7vw,100px);line-height:.88;font-style:italic;text-shadow:4px 4px 0 #17285f,0 0 35px #5cf2ff52}.primary{color:#060817;background:var(--yellow);border:0;border-radius:6px;padding:14px 28px;min-width:180px;cursor:pointer;transform:skew(-5deg);box-shadow:0 0 25px #fff45c61;letter-spacing:.08em}.hint{margin-top:12px;color:#ffffff80;font:600 11px Arial,sans-serif}.label{position:absolute;top:12px;font:800 10px Arial,sans-serif;letter-spacing:.18em;opacity:.58}.label.left{left:16px;color:var(--cyan)}.label.right{right:16px;color:var(--pink)}.panel{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:20px}.difficulty{display:flex;gap:14px;align-items:center}.difficulty>span{font:800 10px Arial,sans-serif;letter-spacing:.15em;color:#ffffff80}.segments{display:flex;border:1px solid #ffffff26;padding:3px;border-radius:7px;background:#0003}.segments button{border:0;color:#ffffff80;background:transparent;font:800 10px Arial,sans-serif;letter-spacing:.08em;padding:8px 12px;border-radius:4px;cursor:pointer}.segments button.active{background:var(--cyan);color:#061021;box-shadow:0 0 14px #5cf2ff59}.help{display:flex;align-items:center;gap:12px;font:800 10px Arial,sans-serif;letter-spacing:.1em}.keys{display:flex;gap:4px}kbd{min-width:30px;height:30px;display:grid;place-items:center;background:#ffffff17;border:1px solid #ffffff3d;border-bottom-width:3px;border-radius:5px;font:700 15px Arial,sans-serif}.help p{margin:0}.help span{display:block;color:#ffffff73;margin-top:4px;font-weight:500}.pause{justify-self:end}.touch{display:none;grid-template-columns:1fr 1fr;gap:12px}.touch button{touch-action:none;user-select:none;height:70px;border-radius:10px;border:1px solid #5cf2ff73;background:#5cf2ff1a;color:var(--cyan);font-size:24px}.touch button:active{background:var(--cyan);color:var(--ink)}.touch span{display:block;font:800 9px Arial,sans-serif;letter-spacing:.15em;margin-top:4px}button:focus-visible{outline:3px solid var(--yellow);outline-offset:3px}
    @media(max-width:720px),(pointer:coarse){.shell{gap:10px;padding-bottom:14px}.fullscreen,.help{display:none}.scoreboard{width:100%}.arena{height:min(48vh,500px);min-height:260px}.panel{grid-template-columns:1fr auto}.difficulty{gap:7px}.difficulty>span{display:none}.segments button{padding:8px 9px}.touch{display:grid}}
    @media(max-height:680px) and (min-width:721px){.shell{gap:7px;padding-top:8px}.arena{height:50vh;min-height:260px}.side strong{font-size:42px}.scoreboard{width:68%}}
  </style>
</head>
<body>
<main class="shell">
  <header><div class="brand"><i class="dot"></i>PONG<em>CLASH</em></div><div class="actions"><button id="sound" class="ghost">SOUND ON</button><button id="full" class="ghost fullscreen">FULLSCREEN</button></div></header>
  <section class="scoreboard" aria-label="Score"><div class="side you"><span>YOU</span><strong id="youScore">0</strong></div><div class="target">FIRST TO 7<i></i></div><div class="side cpu"><strong id="cpuScore">0</strong><span>CPU</span></div></section>
  <section class="arena-wrap"><div class="arena" id="arena"><canvas id="game" aria-label="Ping pong game table"></canvas><div class="overlay" id="overlay"><small id="eyebrow">HUMAN vs COMPUTER</small><h1 id="headline">READY TO RALLY?</h1><button class="primary" id="start">START MATCH</button><span class="hint">Press space</span></div><div class="label left">HUMAN</div><div class="label right">COMPUTER</div></div></section>
  <section class="panel"><div class="difficulty"><span>DIFFICULTY</span><div class="segments"><button data-level="easy">EASY</button><button class="active" data-level="medium">MEDIUM</button><button data-level="hard">HARD</button></div></div><div class="help"><div class="keys"><kbd>â†‘</kbd><kbd>â†“</kbd></div><p>MOVE YOUR PADDLE<span>Arrow keys on desktop</span></p></div><button class="ghost pause" id="pause">PLAY</button></section>
  <div class="touch"><button id="up">â–²<span>UP</span></button><button id="down">â–¼<span>DOWN</span></button></div>
</main>
<script>
(()=>{
const canvas=document.getElementById('game'),arena=document.getElementById('arena'),ctx=canvas.getContext('2d'),overlay=document.getElementById('overlay'),headline=document.getElementById('headline'),eyebrow=document.getElementById('eyebrow'),start=document.getElementById('start'),pause=document.getElementById('pause'),soundBtn=document.getElementById('sound'),youEl=document.getElementById('youScore'),cpuEl=document.getElementById('cpuScore');
const settings={easy:{ai:310,error:72,ball:470},medium:{ai:430,error:34,ball:540},hard:{ai:565,error:10,ball:620}};
let level='medium',state='ready',score={you:0,cpu:0},sound=true,w=0,h=0,last=0;
const e={py:.5,ay:.5,bx:.5,by:.5,vx:0,vy:0,up:false,down:false,touch:0,target:.5,trail:[]};
function beep(freq,d=.045){if(!sound)return;try{const A=window.AudioContext||window.webkitAudioContext,a=new A,o=a.createOscillator(),g=a.createGain();o.type='square';o.frequency.value=freq;g.gain.setValueAtTime(.045,a.currentTime);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+d);o.connect(g).connect(a.destination);o.start();o.stop(a.currentTime+d);o.onended=()=>a.close()}catch{}}
function serve(left=Math.random()>.5){const s=settings[level].ball,a=Math.random()*.7-.35;e.bx=e.by=.5;e.vx=(left?-1:1)*s*Math.cos(a);e.vy=s*Math.sin(a);e.trail=[]}
function begin(){score={you:0,cpu:0};youEl.textContent=cpuEl.textContent='0';e.py=e.ay=.5;state='playing';overlay.hidden=true;pause.textContent='PAUSE';serve(false)}
function toggle(){if(state==='ready'||state==='over')return begin();state=state==='playing'?'paused':'playing';overlay.hidden=state==='playing';headline.textContent='MATCH PAUSED';eyebrow.textContent='TAKE A BREATH';start.textContent='RESUME';pause.textContent=state==='playing'?'PAUSE':'RESUME';last=performance.now()}
function gameOver(winner){state='over';e.vx=e.vy=0;overlay.hidden=false;headline.textContent=winner==='you'?'YOU RULE THE TABLE!':'THE BOT TAKES IT!';eyebrow.textContent='MATCH COMPLETE';start.textContent='REMATCH';pause.textContent='PLAY'}
function resize(){const r=arena.getBoundingClientRect(),d=Math.min(devicePixelRatio||1,2);w=r.width;h=r.height;canvas.width=Math.round(w*d);canvas.height=Math.round(h*d);canvas.style.width=w+'px';canvas.style.height=h+'px';ctx.setTransform(d,0,0,d,0,0)}new ResizeObserver(resize).observe(arena);resize();
function loop(now){const dt=Math.min((now-(last||now))/1000,.03);last=now;const ph=Math.max(72,h*.22),pw=Math.max(12,w*.018),m=Math.max(20,w*.04),r=Math.max(9,w*.012);
if(state==='playing'&&w&&h){const dir=(e.down?1:0)-(e.up?1:0)+e.touch;e.py+=dir*.82*dt;e.py=Math.max(ph/h/2,Math.min(1-ph/h/2,e.py));const s=settings[level];if(e.vx>0&&Math.random()<.04)e.target=e.by+(Math.random()-.5)*s.error/h;const ad=e.target-e.ay;e.ay+=Math.sign(ad)*Math.min(Math.abs(ad),s.ai/h*dt);e.ay=Math.max(ph/h/2,Math.min(1-ph/h/2,e.ay));e.bx+=e.vx/w*dt;e.by+=e.vy/h*dt;e.trail.unshift({x:e.bx,y:e.by,a:.42});e.trail=e.trail.slice(0,8).map(q=>({...q,a:q.a*.72}));if((e.by*h-r<=0&&e.vy<0)||(e.by*h+r>=h&&e.vy>0)){e.vy*=-1;e.by=Math.max(r/h,Math.min(1-r/h,e.by));beep(210)}const px=m+pw,ax=w-m-pw,bx=e.bx*w,by=e.by*h,pt=e.py*h-ph/2,at=e.ay*h-ph/2;if(e.vx<0&&bx-r<=px&&bx>m-r&&by>=pt-r&&by<=pt+ph+r){const im=(by-e.py*h)/(ph/2),sp=Math.min(Math.hypot(e.vx,e.vy)*1.055,920);e.vx=Math.abs(sp*Math.cos(im*.82));e.vy=sp*Math.sin(im*.82);e.bx=(px+r)/w;beep(480)}if(e.vx>0&&bx+r>=ax&&bx<w-m+r&&by>=at-r&&by<=at+ph+r){const im=(by-e.ay*h)/(ph/2),sp=Math.min(Math.hypot(e.vx,e.vy)*1.045,920);e.vx=-Math.abs(sp*Math.cos(im*.82));e.vy=sp*Math.sin(im*.82);e.bx=(ax-r)/w;beep(390)}if(e.bx<-.05||e.bx>1.05){const you=e.bx>1;score[you?'you':'cpu']++;youEl.textContent=score.you;cpuEl.textContent=score.cpu;beep(you?720:120,.12);if(score.you>=7||score.cpu>=7)gameOver(score.you>=7?'you':'cpu');else serve(!you)}}
const grad=ctx.createLinearGradient(0,0,w,h);grad.addColorStop(0,'#071936');grad.addColorStop(1,'#14072f');ctx.fillStyle=grad;ctx.fillRect(0,0,w,h);ctx.strokeStyle='#5cf2ff29';ctx.lineWidth=1;const grid=Math.max(36,w/18);for(let x=0;x<w;x+=grid){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke()}for(let y=0;y<h;y+=grid){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke()}ctx.setLineDash([14,14]);ctx.strokeStyle='#ffffff80';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(w/2,18);ctx.lineTo(w/2,h-18);ctx.stroke();ctx.setLineDash([]);e.trail.forEach(q=>{ctx.beginPath();ctx.arc(q.x*w,q.y*h,r*q.a,0,Math.PI*2);ctx.fillStyle=`rgba(255,239,93,${q.a})`;ctx.fill()});function paddle(x,y,c){ctx.save();ctx.shadowBlur=22;ctx.shadowColor=c;ctx.fillStyle=c;ctx.beginPath();ctx.roundRect(x,y-ph/2,pw,ph,pw/2);ctx.fill();ctx.restore()}paddle(m,e.py*h,'#5cf2ff');paddle(w-m-pw,e.ay*h,'#ff4fd8');ctx.save();ctx.shadowBlur=25;ctx.shadowColor='#fff45c';ctx.fillStyle='#fff45c';ctx.beginPath();ctx.arc(e.bx*w,e.by*h,r,0,Math.PI*2);ctx.fill();ctx.restore();requestAnimationFrame(loop)}requestAnimationFrame(loop);
addEventListener('keydown',x=>{if(['ArrowUp','ArrowDown',' '].includes(x.key))x.preventDefault();if(x.key==='ArrowUp')e.up=true;if(x.key==='ArrowDown')e.down=true;if(x.key===' ')toggle()});addEventListener('keyup',x=>{if(x.key==='ArrowUp')e.up=false;if(x.key==='ArrowDown')e.down=false});start.onclick=toggle;pause.onclick=toggle;soundBtn.onclick=()=>{sound=!sound;soundBtn.textContent=sound?'SOUND ON':'MUTED'};document.getElementById('full').onclick=()=>document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen();document.querySelectorAll('[data-level]').forEach(b=>b.onclick=()=>{level=b.dataset.level;document.querySelectorAll('[data-level]').forEach(x=>x.classList.toggle('active',x===b))});for(const[id,d]of[['up',-1],['down',1]]){const b=document.getElementById(id);b.onpointerdown=x=>{x.preventDefault();e.touch=d;b.setPointerCapture(x.pointerId)};b.onpointerup=b.onpointercancel=b.onpointerleave=()=>e.touch=0}
})();
</script>
</body>
</html>
